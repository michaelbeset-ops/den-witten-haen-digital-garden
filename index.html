<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/jpeg" href="/favicon.jpg" />
    <title>Den Witten Haen — Lunchroom Dordrecht</title>
    <meta name="description" content="Den Witten Haen is een sfeervolle lunchroom in het hart van Dordrecht. Geniet van lunch, high tea en meer in een monumentaal pand met verborgen stadstuin." />

    <meta property="og:title" content="Den Witten Haen — Lunchroom Dordrecht" />
    <meta property="og:description" content="Lunch, high tea & meer in het hart van Dordrecht." />
    <meta property="og:type" content="website" />

    <!-- Structured data (openingstijden e.d.) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "CafeOrCoffeeShop",
        "name": "Den Witten Haen",
        "description": "Sfeervolle lunchroom in het hart van Dordrecht. Lunch, high tea en meer in een monumentaal pand met verborgen stadstuin.",
        "servesCuisine": ["Lunch", "High tea"],
        "telephone": "+31786112050",
        "email": "denwittenhaen@philadelphia.nl",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Groenmarkt 19-B",
          "postalCode": "3311 BD",
          "addressLocality": "Dordrecht",
          "addressCountry": "NL"
        },
        "openingHoursSpecification": [
          {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"],
            "opens": "10:00",
            "closes": "16:00"
          },
          {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": "Saturday",
            "opens": "10:00",
            "closes": "17:00"
          }
        ]
      }
    </script>

    <!-- GitHub Pages SPA routing fix -->
    <script>
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
